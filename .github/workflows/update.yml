name: Update data & deploy

# 毎週月曜 09:00 JST (00:00 UTC) に Steam から再集計し、GitHub Pages へ公開。
# 手動実行・main への push でも走る。
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyyaml

      - name: Build data.json from Steam
        run: python scripts/build_data.py

      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp styles.css _site/
          cp data.json _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
